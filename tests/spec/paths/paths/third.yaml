components:
  schemas:
    user:
      type: object
      properties:
        username:
          type: string
        uuid:
          type: string
    repository:
      type: object
      properties:
        slug:
          type: string
        owner:
          $ref: "#/components/schemas/user"
        weather:
          $ref: './repro.yaml/#/components/schemas/Weather'
    CyclicRef:
      title: CyclicRefTitle
      type: object
      properties:
        bar:
          $ref: "./repro.yaml/#/components/schemas/CyclicRef"
  links:
    RepositoryPullRequests:
      # returns '#/components/schemas/pullrequest'
      operationId: getPullRequestsByRepository
      parameters:
        username: $response.body#/owner/username
        slug: $response.body#/slug